name: 🔄 Sync Presets

on:
  push:
    paths:
      - 'storage/presets/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 🔄 Sync presets
        run: python .github/workflows/sync_presets.py
      
      - name: 🔗 Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Sync-Bot"
          git pull --rebase origin main || true
          git add docs/presets.json
          git commit -m "🔄 Sync presets: $(date '+%Y-%m-%d %H:%M:%S')" || echo "✅ No changes"
          git push origin main
