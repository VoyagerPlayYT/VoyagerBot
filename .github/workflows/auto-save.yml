name: 🔄 Auto-Save

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  save:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 💾 Run auto-save
        run: python .github/workflows/auto_save.py
      
      - name: 🔗 Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Auto-Save"
          git pull --rebase origin main || true
          git add -A
          git commit -m "🔄 Auto-save: $(date '+%Y-%m-%d %H:%M:%S')" || echo "✅ No changes"
          git push origin main
